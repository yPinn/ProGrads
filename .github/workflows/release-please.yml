name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Reads release-please-config.json + .release-please-manifest.json.
      # Opens/updates a Release PR; merging it tags vX.Y.Z and writes CHANGELOG.
      - uses: googleapis/release-please-action@v4
