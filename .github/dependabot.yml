version: 2
updates:
  - package-ecosystem: npm # works with pnpm lockfile
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # Zod pinned to v3 for @vee-validate/zod and nestjs-zod compatibility (D13).
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
