packages:
  - "apps/*"
  - "packages/*"
  - "tools/*"
  # Standalone npm tool with a heavy one-off native dep (cn-font-split); not part of
  # the workspace install. Run on demand via `npm install` in the dir (see its README).
  - "!tools/font-subset"

engineStrict: true

# Nuxt modules (e.g. @nuxtjs/seo) dynamically installModule() their sub-modules,
# which Nuxt resolves from the project root. Hoist nuxt-related packages so pnpm's
# strict node_modules doesn't hide transitive modules like @nuxtjs/robots.
publicHoistPattern:
  - "*nuxt*"

# Explicitly reviewed install-script allowlist. `allowBuilds` supersedes
# `onlyBuiltDependencies` in pnpm 10.26+ and remains the forward-compatible form.
allowBuilds:
  "@parcel/watcher": true
  "@prisma/client": true
  "@prisma/engines": true
  "@scarf/scarf": false # telemetry-only postinstall; explicitly skipped
  better-sqlite3: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

peerDependencyRules:
  allowedVersions:
    "@unhead/bundler>unhead": "2"

# @nuxtjs/mdc imports "h3" without declaring it, so it picks up whatever h3 is
# hoisted — which ends up being devframe's prerelease v2. Its highlight event
# handler runs inside the nitro server (h3 v1), so v2's getQuery(new URL(req.url))
# throws on the relative dev URL. Pin mdc to v1 to match the runtime; devframe
# keeps its own v2.
packageExtensions:
  "@nuxtjs/mdc":
    dependencies:
      h3: "^1.15.11"
